<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>小金鲤 - 自选</title>
<script src="assets/vendor/tailwindcss.js"></script>
<script src="assets/vendor/iconify-icon.min.js"></script>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFB800',
                        secondary: '#FF6B00',
                        bgMain: '#F8F9FC',
                        up: '#D92D3A',
                        down: '#14866D',
                        textMain: '#1F2023',
                        textSub: '#697077',
                        textAssist: '#999999',
                        line: '#EAECF0'
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

        /* Top tabs */
        .top-tab { font-size: 13px; font-weight: 400; color: #999; padding: 0 2px; position: relative; white-space: nowrap; }
        .top-tab-active { color: #FFB800; font-weight: 600; }
        .top-tab-active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px; background: #FFB800; border-radius: 1px; }
        .top-tab-bold { font-weight: 600; color: #1F2023; }

        /* Table-like fund row */
        .fund-row { display: grid; grid-template-columns: 1.3fr 0.65fr 0.55fr 0.75fr; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; gap: 4px; }
        .fund-row:active { background: #fafafa; }

        /* Column header */
        .col-header { font-size: 11px; color: #999; padding: 10px 0 8px; border-bottom: 1px solid #eee; }
        .col-header-sortable { cursor: pointer; user-select: none; }
        .col-header-sortable:active { color: #666; }

        /* Summary bar */
        .summary-item { text-align: center; }
        .summary-label { font-size: 10px; color: #999; margin-bottom: 2px; }
        .summary-value { font-size: 13px; font-weight: 700; }
    </style>
</head>
<body class="bg-white text-textMain">
<div class="max-w-[414px] mx-auto min-h-screen flex flex-col relative bg-white shadow-xl">
<!-- 顶部品牌栏 -->
<header class="sticky top-0 z-50 bg-primary px-4 py-3 flex justify-between items-center shadow-md text-white">
<div class="flex items-center gap-3">
<button onclick="history.back()"><iconify-icon class="text-2xl" icon="solar:alt-arrow-left-linear"></iconify-icon></button>
<span class="font-bold text-lg">自选</span>
</div>
<iconify-icon class="text-xl cursor-pointer" icon="solar:menu-dots-bold"></iconify-icon>
</header>

<!-- 持仓概览 -->
<div class="px-4 py-3 bg-white border-b border-line">
<div class="grid grid-cols-2 gap-2">
<div class="summary-item">
<div class="summary-label">持仓数量</div>
<div class="summary-value text-textMain">8 <span class="text-[10px] font-normal text-textAssist">只</span></div>
</div>
<div class="summary-item">
<div class="summary-label">累计收益</div>
<div class="summary-value text-up">+12.63%</div>
</div>
</div>
</div>

<!-- Top Tabs -->
<div class="sticky top-[52px] z-40 bg-white px-4 pt-3 pb-0 border-b border-line">
<div class="flex items-center gap-5 overflow-x-auto">
<button class="top-tab top-tab-active" onclick="switchTopTab(this)">全部</button>
<button class="top-tab top-tab-bold" onclick="switchTopTab(this)">股票</button>
<button class="top-tab top-tab-bold" onclick="switchTopTab(this)">基金</button>
<button class="top-tab" onclick="switchTopTab(this)">作业</button>
<div class="flex-1"></div>
<iconify-icon class="text-xl text-textAssist cursor-pointer" icon="solar:sort-linear"></iconify-icon>
</div>
</div>

<main class="flex-1 overflow-y-auto pb-24">
<!-- Column Headers -->
<div class="px-4 col-header grid grid-cols-[1.3fr_0.65fr_0.55fr_0.75fr] gap-1">
<div class="flex items-center gap-1">基金名称</div>
<div class="col-header-sortable flex items-center justify-end gap-0.5">
净值
<iconify-icon class="text-[10px]" icon="solar:alt-arrow-up-linear"></iconify-icon>
<iconify-icon class="text-[10px] -mt-1" icon="solar:alt-arrow-down-linear"></iconify-icon>
</div>
<div class="text-center">作业来源</div>
<div class="text-right">添加后收益</div>
</div>

<!-- Fund List -->
<div class="px-4" id="fund-list"></div>
</main>

<!-- 底部导航 -->
<nav class="fixed bottom-0 w-full max-w-[414px] bg-white/80 backdrop-blur-md border-t border-gray-100 px-4 py-3 flex justify-between items-center z-50 safe-bottom">
<a class="flex flex-col items-center gap-1 text-textAssist" href="discover.html">
<iconify-icon class="text-2xl" icon="solar:home-smile-angle-linear"></iconify-icon>
<span class="text-[10px]">发现</span>
</a>
<a class="flex flex-col items-center gap-1 text-textAssist" href="copytrade.html">
<iconify-icon class="text-2xl" icon="solar:copy-bold"></iconify-icon>
<span class="text-[10px]">广场</span>
</a>
<a class="flex flex-col items-center gap-1 text-textAssist" href="toolbox.html">
<iconify-icon class="text-2xl" icon="solar:lightbulb-bold"></iconify-icon>
<span class="text-[10px]">灵感</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="profile.html">
<iconify-icon class="text-2xl" icon="solar:user-bold"></iconify-icon>
<span class="text-[10px] font-bold">我的</span>
</a>
</nav>
<!-- 全局浮窗 -->
<div class="fixed right-4 bottom-24 z-[60] cursor-pointer" onclick="location.href='ai_assistant.html'">
<div class="w-14 h-14 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center shadow-lg border-2 border-white">
<span class="text-2xl">&#x1F41F;</span>
</div>
</div>
</div>
<script>
    var funds = [
        { name: '广发全球精选股票(QDII)A', code: '270023', nav: 7.5358, navDate: '06-30', change: '+2.63%', up: true, totalReturn: '+12.63%', totalUp: true, days: '19天', homework: '睿远均衡' },
        { name: '易方达全球优质企业混合(QDII)A', code: '018229', nav: 2.6418, navDate: '06-30', change: '+2.97%', up: true, totalReturn: '+19.64%', totalUp: true, days: '19天', homework: '易方达蓝筹' },
        { name: '南方红利低波50ETF联接A', code: '008163', nav: 0.9861, navDate: '06-30', change: '+1.30%', up: true, totalReturn: '-6.89%', totalUp: false, days: '19天', homework: '高毅资产' },
        { name: '建信新兴市场优选混合(QDII)C', code: '018147', nav: 2.8030, navDate: '06-30', change: '+2.79%', up: true, totalReturn: '+5.57%', totalUp: true, days: '28天', homework: '景林资产' },
        { name: '易方达全球成长精选混合(QDII)A', code: '012920', nav: 5.2809, navDate: '06-30', change: '+4.29%', up: true, totalReturn: '+82.33%', totalUp: true, days: '128天', homework: '淡水泉' },
        { name: '易方达成长动力混合A', code: '014727', nav: 3.6721, navDate: '06-30', change: '-1.86%', up: false, totalReturn: '+55.70%', totalUp: true, days: '128天', homework: '中欧医疗' },
        { name: '沪深300ETF', code: '510300', nav: 4.1256, navDate: '06-30', change: '+1.52%', up: true, totalReturn: '+8.45%', totalUp: true, days: '45天', homework: '兴证全球' },
        { name: '通信ETF', code: '515880', nav: 1.2450, navDate: '06-30', change: '+2.48%', up: true, totalReturn: '+11.2%', totalUp: true, days: '30天', homework: '章盟主' }
    ];

    function renderFunds() {
        var html = funds.map(function(f) {
            var changeColor = f.up ? 'text-up' : 'text-down';
            var returnColor = f.totalUp ? 'text-up' : 'text-down';

            return '<div class="fund-row">' +
                '<div>' +
                    '<div class="text-[13px] font-semibold leading-tight truncate">' + f.name + '</div>' +
                    '<div class="text-[10px] text-textAssist mt-0.5">' + f.code + '</div>' +
                '</div>' +
                '<div class="text-right">' +
                    '<div class="text-[13px] font-bold tabular-nums">' + f.nav.toFixed(4) + '</div>' +
                    '<div class="text-[11px] font-semibold ' + changeColor + '">' + f.change + '</div>' +
                '</div>' +
                '<div class="text-center text-[11px] text-textSub">' + f.homework + '</div>' +
                '<div class="text-right">' +
                    '<div class="text-[13px] font-bold tabular-nums ' + returnColor + '">' + f.totalReturn + '</div>' +
                    '<div class="text-[10px] text-textAssist">' + f.days + '</div>' +
                '</div>' +
            '</div>';
        }).join('');
        document.getElementById('fund-list').innerHTML = html;
    }

    function switchTopTab(btn) {
        var tabs = btn.parentNode.querySelectorAll('.top-tab');
        for (var i = 0; i < tabs.length; i++) {
            tabs[i].classList.remove('top-tab-active', 'top-tab-bold');
        }
        if (btn.textContent === '全部') {
            btn.classList.add('top-tab-active');
        } else {
            btn.classList.add('top-tab-bold');
        }
    }

    renderFunds();
</script>
</body>
</html>
