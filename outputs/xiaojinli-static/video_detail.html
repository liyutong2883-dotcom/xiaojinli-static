    from { opacity: 0; transform: translateY(8px); }

</style>

<body class="bg-bgMain text-textMain">

    <h1 class="font-bold text-base text-textMain flex-1">大咖投研</h1>

  <!-- Main Content -->

    <!-- Video Info -->

              <span class="mx-1">·</span>
              <span id="video-date">3天前发布</span>
            </div>
          </div>
        </div>
        <button class="bg-primary/10 text-primary text-xs font-bold px-3 py-1.5 rounded-full">
          + 关注
        </button>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="px-4 py-2 flex items-center justify-between border-b border-gray-100 animate-fade-in delay-2">
      <button class="flex items-center gap-1.5 text-textSub hover:text-primary transition-colors" id="btn-like">
        <iconify-icon class="text-xl" icon="solar:like-bold"></iconify-icon>
        <span class="text-xs font-medium">328</span>
      </button>
      <button class="flex items-center gap-1.5 text-textSub hover:text-primary transition-colors" id="btn-fav">
        <iconify-icon class="text-xl" icon="solar:star-bold"></iconify-icon>

      <button class="flex items-center gap-1.5 text-textAssist hover:text-textSub transition-colors" id="btn-report">
        <iconify-icon class="text-lg" icon="solar:flag-bold"></iconify-icon>
        <span class="text-xs">举报</span>
      </button>
    </div>

    <!-- Comments Section -->
    <div class="px-4 mt-3 animate-fade-in delay-3">

        <div class="flex items-center gap-1 text-textAssist text-xs">

      <!-- Comment Input -->

      </div>

      <!-- Comments List -->

      </div>

  </main>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 w-full max-w-[414px] glass-effect border-t border-gray-100 px-4 py-3 flex justify-between items-center z-50 safe-bottom">
    <a class="flex flex-col items-center gap-1 text-primary" href="discover.html">
      <iconify-icon class="text-2xl" icon="solar:home-smile-angle-bold"></iconify-icon>
      <span class="text-[10px] font-bold">发现</span>
    </a>
    <a class="flex flex-col items-center gap-1 text-textAssist" href="copytrade.html">

    </a>
    <a class="flex flex-col items-center gap-1 text-textAssist" href="toolbox.html">
      <iconify-icon class="text-2xl" icon="solar:box-bold"></iconify-icon>
      <span class="text-[10px]">仓库</span>
    </a>
    <a class="flex flex-col items-center gap-1 text-textAssist" href="profile.html">
      <iconify-icon class="text-2xl" icon="solar:user-bold"></iconify-icon>
      <span class="text-[10px]">我的</span>
    </a>
  </nav>

  <!-- Floating AI Button -->
  <div class="fixed right-4 bottom-24 z-[60] cursor-pointer group" id="fab">
    <div class="w-14 h-14 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center shadow-lg border-2 border-white">
      <span class="text-2xl">🐟</span>
    </div>
  </div>

  <!-- AI Quick Question Panel -->
  <div class="fixed inset-0 z-[100] hidden" id="ai-panel">
    <div class="absolute inset-0 bg-black/40" onclick="toggleAI()"></div>
    <div class="absolute bottom-0 w-full max-w-[414px] bg-white rounded-t-3xl p-6 shadow-2xl animate-slide-up">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-lg font-bold flex items-center gap-2">
          <span class="text-2xl">🐟</span> 快捷问小金鲤
        </h3>
        <button class="text-textAssist" onclick="toggleAI()">
          <iconify-icon class="text-2xl" icon="solar:close-circle-linear"></iconify-icon>
        </button>
      </div>
      <div class="space-y-3 mb-6">
        <button class="w-full text-left p-4 bg-bgMain rounded-xl text-sm hover:bg-primary/10 transition-colors" onclick="location.href='ai_assistant.html'">这份作业适合我吗？</button>
        <button class="w-full text-left p-4 bg-bgMain rounded-xl text-sm hover:bg-primary/10 transition-colors" onclick="location.href='ai_assistant.html'">这个组合为什么这么配？</button>
        <button class="w-full text-left p-4 bg-bgMain rounded-xl text-sm hover:bg-primary/10 transition-colors" onclick="location.href='ai_assistant.html'">它最大的风险是什么？</button>
      </div>
      <div class="flex gap-2">
        <input class="flex-1 bg-bgMain rounded-full px-4 py-3 text-sm outline-none focus:ring-1 ring-primary" placeholder="输入你想问的问题..." type="text"/>
        <button class="bg-primary text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg" onclick="location.href='ai_assistant.html'">
          <iconify-icon class="text-xl" icon="solar:plain-bold"></iconify-icon>
        </button>
      </div>
      <div class="text-center mt-4">
        <a class="text-xs text-primary font-bold" href="ai_assistant.html">进入完整 AI 对话模式 &gt;</a>
      </div>
    </div>
  </div>

</div>

<script>
  // ========== Parse URL Parameters ==========
  function getUrlParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      title: params.get('title') || '下半年消费板块怎么看？',
      author: params.get('author') || '张大牛'
    };
  }

  // ========== Video Data (for gradient mapping) ==========
  const videoGradients = {
    '张大牛': 'from-amber-400 to-orange-500',
    '李策略': 'from-blue-400 to-indigo-500',
    '王稳健': 'from-emerald-400 to-teal-500'
  };

  const videoMeta = {
    '下半年消费板块怎么看？': { views: '2.3万', duration: '5:32', date: '3天前发布' },
    '新能源还能追吗？三个信号值得关注': { views: '1.8万', duration: '4:15', date: '5天前发布' },
    '红利策略的天花板在哪里': { views: '3.1万', duration: '6:48', date: '1周前发布' }
  };

  // ========== Comments Data ==========
  const comments = [
    {
      user: '投资小白鼠', avatar: '🐭', avatarBg: 'bg-gray-100',
      time: '2小时前', content: '讲得很清楚！消费板块确实被低估了，准备开始关注这个方向。', likes: 42, liked: false
    },
    {
      user: '老张说财经', avatar: '📊', avatarBg: 'bg-blue-100',
      time: '3小时前', content: '作为从业十年的老兵，这个分析框架很扎实。补充一点：还要关注政策面的变化。', likes: 89, liked: true
    },
    {
      user: '价值投资者Amy', avatar: '👩', avatarBg: 'bg-pink-100',
      time: '5小时前', content: '之前一直犹豫要不要加仓消费ETF，看完视频有信心了。谢谢老师分享！', likes: 31, liked: false
    },
    {
      user: '短线猎手', avatar: '🎯', avatarBg: 'bg-amber-100',
      time: '6小时前', content: '消费偏防守，我更喜欢科技赛道。不过分析逻辑确实有道理。', likes: 17, liked: false
    },
    {
      user: '慢慢变富', avatar: '🌱', avatarBg: 'bg-green-100',
      time: '8小时前', content: '定投消费基金三年了，确实如视频所说，长期来看消费是最稳的赛道之一。', likes: 56, liked: false
    },
    {
      user: '理财规划师小林', avatar: '💼', avatarBg: 'bg-purple-100',
      time: '1天前', content: '建议新手不要一把梭，分批建仓更稳妥。视频里提到的估值分位数是个好指标。', likes: 73, liked: true
    }
  ];

  // ========== AI Agent Comments Data (with AI replies) ==========
  const aiCommentsData = {
    '张大牛': [
      {
        user: '小鱼儿', avatar: '👧', avatarBg: 'bg-pink-100',
        text: '@张大牛.ai 消费板块下半年还能布局吗？', likes: 328,
        aiReply: '消费板块当前估值处于历史30%分位，下半年随着促消费政策落地和中秋国庆旺季，龙头标的具备配置价值。建议关注估值合理、现金流稳定的细分龙头，分批建仓更稳妥。'
      },
      {
        user: '老陈', avatar: '👦', avatarBg: 'bg-blue-100',
        text: '@张大牛.ai 白酒还值得持有吗？', likes: 215,
        aiReply: '白酒板块分化明显，高端白酒库存去化顺利，但次高端仍面临压力。如果你持有的是龙头标的，建议继续持有；如果是二三线品牌，可以趁反弹适当减仓。'
      }
    ],
    '李策略': [
      {
        user: '阿杰', avatar: '👦', avatarBg: 'bg-blue-100',
        text: '@李策略.ai 三个信号具体指什么？', likes: 456,
        aiReply: '三个关键信号：① 新能源渗透率突破40%后的增速拐点；② 上游锂矿价格企稳回升；③ 政策端对储能和充电桩的新补贴落地。目前信号①已出现，②③仍在观察中。'
      },
      {
        user: '月月', avatar: '👧', avatarBg: 'bg-pink-100',
        text: '@李策略.ai 新能源现在上车晚不晚？', likes: 189,
        aiReply: '新能源长期逻辑没变，但短期需要精选方向。光伏和锂电处于产能出清阶段，可以关注；储能和充电桩是增量赛道，确定性更高。建议定投而非一把梭。'
      }
    ],
    '王稳健': [
      {
        user: '大壮', avatar: '👦', avatarBg: 'bg-blue-100',
        text: '@王稳健.ai 红利策略适合新手吗？', likes: 521,
        aiReply: '红利策略非常适合新手！它波动小、分红稳定，本质是"边赚钱边学习"。选择红利ETF或高股息基金，每月定投，长期收益往往跑赢大部分主动基金。'
      },
      {
        user: '豆豆', avatar: '👧', avatarBg: 'bg-pink-100',
        text: '@王稳健.ai 天花板到了是不是该卖？', likes: 167,
        aiReply: '"天花板"需要区分是估值天花板还是基本面天花板。如果是估值到了历史高位但基本面依然健康，可以减仓但不必清仓；如果是行业逻辑变了，那就果断卖出。'
      }
    ]
  };

  // ========== Render Video Info ==========
  function renderVideoInfo() {
    const params = getUrlParams();
    const meta = videoMeta[params.title] || { views: '2.3万', duration: '5:32', date: '3天前发布' };
    const gradient = videoGradients[params.author] || 'from-amber-400 to-orange-500';

    document.getElementById('video-title').textContent = params.title;
    document.getElementById('video-author').textContent = params.author;
    document.getElementById('video-author-avatar').textContent = params.author.charAt(0);
    document.getElementById('video-author-avatar').className = 'w-8 h-8 rounded-full bg-gradient-to-br ' + gradient + ' flex items-center justify-center text-white text-xs font-bold';
    document.getElementById('video-views').textContent = meta.views;
    document.getElementById('video-duration').textContent = meta.duration;
    document.getElementById('video-date').textContent = meta.date;

    // Update video player gradient
    document.getElementById('video-player').className = 'w-full h-[220px] bg-gradient-to-br ' + gradient + ' flex items-center justify-center relative';
  }

  // ========== Render Comments ==========
  function renderComments() {
    const params = getUrlParams();
    const container = document.getElementById('comments-list');
    const aiComments = aiCommentsData[params.author] || [];
    
    // Build combined list: regular comments with AI threads interleaved
    var html = '';
    var aiIndex = 0;
    
    comments.forEach(function(c, idx) {
      // Regular comment
      html += ''
        + '<div class="flex gap-2.5">'
        +   '<div class="w-8 h-8 rounded-full ' + c.avatarBg + ' flex items-center justify-center text-sm flex-shrink-0">' + c.avatar + '</div>'
        +   '<div class="flex-1 min-w-0">'
        +     '<div class="flex items-center justify-between mb-0.5">'
        +       '<span class="text-xs font-medium text-textMain">' + c.user + '</span>'
        +       '<span class="text-[10px] text-textAssist">' + c.time + '</span>'
        +     '</div>'
        +     '<p class="text-sm text-textSub leading-relaxed mb-1.5">' + c.content + '</p>'
        +     '<div class="flex items-center gap-3">'
        +       '<button class="flex items-center gap-1 ' + (c.liked ? 'text-up' : 'text-textAssist') + ' hover:text-up transition-colors">'
        +         '<iconify-icon class="text-sm" icon="solar:like-bold"></iconify-icon>'
        +         '<span class="text-[11px]">' + c.likes + '</span>'
        +       '</button>'
        +       '<button class="flex items-center gap-1 text-textAssist hover:text-textSub transition-colors">'
        +         '<iconify-icon class="text-sm" icon="solar:chat-round-bold"></iconify-icon>'
        +         '<span class="text-[11px]">回复</span>'
        +       '</button>'
        +     '</div>'
        +   '</div>'
        + '</div>';
      
      // After every 2 regular comments, insert an AI thread
      if ((idx + 1) % 2 === 0 && aiIndex < aiComments.length) {
        var ac = aiComments[aiIndex];
        html += ''
          + '<div class="ml-10 pl-3 border-l-2 border-primary/20">'
          // User question
          +   '<div class="flex gap-2">'
          +     '<div class="w-7 h-7 rounded-full ' + ac.avatarBg + ' flex items-center justify-center text-xs flex-shrink-0">' + ac.avatar + '</div>'
          +     '<div class="flex-1 min-w-0">'
          +       '<p class="text-sm text-textSub leading-relaxed">' + ac.text + '</p>'
          +       '<div class="flex items-center gap-2 mt-1">'
          +         '<button class="flex items-center gap-1 text-textAssist hover:text-primary transition-colors">'
          +           '<iconify-icon class="text-xs" icon="solar:like-linear"></iconify-icon>'
          +           '<span class="text-[10px]">' + ac.likes + '</span>'
          +         '</button>'
          +       '</div>'
          +     '</div>'
          +   '</div>'
          // AI reply
          +   '<div class="flex gap-2 mt-2 bg-gradient-to-r from-primary/5 to-transparent rounded-lg p-2.5">'
          +     '<div class="w-7 h-7 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-xs flex-shrink-0">🤖</div>'
          +     '<div class="flex-1 min-w-0">'
          +       '<div class="flex items-center gap-1 mb-1">'
          +         '<span class="text-[10px] font-bold text-primary">' + params.author + '.ai</span>'
          +         '<span class="text-[9px] text-textAssist bg-primary/10 px-1.5 py-0.5 rounded">AI 回复</span>'
          +       '</div>'
          +       '<p class="text-xs text-textSub leading-relaxed">' + ac.aiReply + '</p>'
          +     '</div>'
          +   '</div>'
          + '</div>';
        aiIndex++;
      }
    });
    
    // If there are remaining AI comments, append them at the end
    while (aiIndex < aiComments.length) {
      var ac = aiComments[aiIndex];
      html += ''
        + '<div class="ml-10 pl-3 border-l-2 border-primary/20">'
        +   '<div class="flex gap-2">'
        +     '<div class="w-7 h-7 rounded-full ' + ac.avatarBg + ' flex items-center justify-center text-xs flex-shrink-0">' + ac.avatar + '</div>'
        +     '<div class="flex-1 min-w-0">'
        +       '<p class="text-sm text-textSub leading-relaxed">' + ac.text + '</p>'
        +       '<div class="flex items-center gap-2 mt-1">'
        +         '<button class="flex items-center gap-1 text-textAssist hover:text-primary transition-colors">'
        +           '<iconify-icon class="text-xs" icon="solar:like-linear"></iconify-icon>'
        +           '<span class="text-[10px]">' + ac.likes + '</span>'
        +         '</button>'
        +       '</div>'
        +     '</div>'
        +   '</div>'
        +   '<div class="flex gap-2 mt-2 bg-gradient-to-r from-primary/5 to-transparent rounded-lg p-2.5">'
        +     '<div class="w-7 h-7 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-xs flex-shrink-0">🤖</div>'
        +     '<div class="flex-1 min-w-0">'
        +       '<div class="flex items-center gap-1 mb-1">'
        +         '<span class="text-[10px] font-bold text-primary">' + params.author + '.ai</span>'
        +         '<span class="text-[9px] text-textAssist bg-primary/10 px-1.5 py-0.5 rounded">AI 回复</span>'
        +       '</div>'
        +       '<p class="text-xs text-textSub leading-relaxed">' + ac.aiReply + '</p>'
        +     '</div>'
        +   '</div>'
        + '</div>';
      aiIndex++;
    }
    
    container.innerHTML = html;
  }

  // ========== AI Panel Toggle ==========
  function toggleAI() {
    var panel = document.getElementById('ai-panel');
    panel.classList.toggle('hidden');
  }

  // ========== Init ==========
  document.addEventListener('DOMContentLoaded', function() {
    renderVideoInfo();
    renderComments();

    document.getElementById('fab').addEventListener('click', toggleAI);
  });
</script>

</body>
</html>
