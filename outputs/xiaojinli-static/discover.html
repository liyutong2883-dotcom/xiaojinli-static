  // ========== Render Daily Widgets (Sign + Calendar side by side) ==========
  function renderDailyWidgets(dnaType) {
    const container = document.getElementById('daily-widgets');
    const dna = dnaType && dnaConfig[dnaType] ? dnaConfig[dnaType] : dnaConfig.turtle;

    // Build mini calendar
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const today = now.getDate();
    const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const noteDays = [5, 12, 20, 25]; // days with note dots (excluding today)

    const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
    let calendarHTML = '';
    // Weekday headers
    weekDays.forEach(function(d) {
      calendarHTML += '<div class="text-[9px] text-textAssist text-center font-medium">' + d + '</div>';
    });
    // Empty cells before first day
    for (var e = 0; e < firstDay; e++) {
      calendarHTML += '<div></div>';
    }
    // Day cells
    for (var day = 1; day <= daysInMonth; day++) {
      var isToday = day === today;
      var hasNote = noteDays.includes(day);
      calendarHTML += '<div class="relative flex items-center justify-center" style="height:22px;">';
      if (isToday) {
        calendarHTML += '<span class="text-[10px] bg-primary text-white w-5 h-5 rounded-full flex items-center justify-center font-bold">' + day + '</span>';
      } else {
        calendarHTML += '<span class="text-[10px] text-textSub">' + day + '</span>';
        if (hasNote) {
          calendarHTML += '<div class="calendar-dot"></div>';
        }
      }
      calendarHTML += '</div>';
    }

    container.innerHTML = ''
      + '<div class="bg-gradient-to-br from-primary to-secondary rounded-2xl p-3 text-white shadow-md relative overflow-hidden flex flex-col">'
      +   '<div class="absolute -right-3 -top-3 w-14 h-14 bg-white/10 rounded-full"></div>'
      +   '<div class="relative z-10 flex-1 flex flex-col justify-between">'
      +     '<div class="flex items-center gap-1 mb-1.5">'
      +       '<iconify-icon class="text-xs" icon="solar:sparkles-bold"></iconify-icon>'
      +       '<span class="text-[10px] font-bold opacity-90">投资日签</span>'
      +     '</div>'
      +     '<div class="text-lg mb-1">' + dna.emoji + '</div>'
      +     '<div class="space-y-1">'
      +       '<div class="flex items-center gap-1.5">'
      +         '<div class="yi-ji-badge bg-white/25 text-white">宜</div>'
      +         '<span class="text-[11px] font-medium leading-tight">' + dna.yi + '</span>'
      +       '</div>'
      +       '<div class="flex items-center gap-1.5">'
      +         '<div class="yi-ji-badge bg-black/15 text-white/90">忌</div>'
      +         '<span class="text-[11px] font-medium leading-tight">' + dna.ji + '</span>'
      +       '</div>'
      +     '</div>'
      +   '</div>'
      + '</div>'
      + '<div class="bg-white rounded-2xl p-3 shadow-sm border border-gray-100 flex flex-col">'
      +   '<div class="flex items-center gap-1 mb-1">'
      +     '<span class="text-xs">📝</span>'
      +     '<span class="text-[10px] font-bold text-textMain">金鲤小记</span>'
      +   '</div>'
      +   '<div class="text-[10px] text-textAssist mb-1">' + year + '年' + (month + 1) + '月</div>'

      +     '<div class="font-bold text-base text-textMain">' + dna.name + '型投资者</div>'
      +   '</div>'
      +   '<div class="text-center text-xs text-textSub mb-4 leading-relaxed px-2">' + dna.subtitle + '</div>'
      +   '<div class="grid grid-cols-2 gap-2 mb-4">'
      +     traitsHTML
      +   '</div>'
      +   '<a href="ai_assistant.html" class="block bg-gradient-to-r from-primary/10 to-secondary/5 rounded-xl p-3 border border-primary/15">'
      +     '<div class="flex items-center justify-between">'
      +       '<div class="flex items-center gap-2">'
      +         '<div class="w-7 h-7 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center">'
      +           '<span class="text-sm">🐟</span>'
      +         '</div>'
      +         '<span class="text-sm font-medium text-textMain">我可以成为怎样的大神</span>'
      +       '</div>'
      +       '<iconify-icon class="text-textAssist text-lg" icon="solar:alt-arrow-right-linear"></iconify-icon>'
      +     '</div>'
      +   '</a>'
      + '</div>';

    // Build discuss mode content
    var avatarEmojis = ['👧', '👦', '', '', '👧', ''];
    var avatarBgs = ['bg-pink-100', 'bg-blue-100', '', '', 'bg-purple-100', ''];
    var likes = [8130, 4121, 6014, 0, 5816, 5309];

    var tagsHTML = '';
    dna.tags.forEach(function(tag, i) {
      if (likes[i] === 0) {
        tagsHTML += '<div class="tag-bubble bg-primary/5 border-primary/20 text-primary font-medium">'
          + '<iconify-icon class="text-sm" icon="solar:add-circle-bold"></iconify-icon>'
          + '<span class="text-xs">我也想说说...</span>'
          + '</div>';
      } else {
        var avatarHTML = '';
        if (avatarEmojis[i]) {
          avatarHTML = '<div class="w-5 h-5 rounded-full ' + avatarBgs[i] + ' flex items-center justify-center text-[8px] flex-shrink-0">' + avatarEmojis[i] + '</div>';
        }
        tagsHTML += '<div class="tag-bubble">'
          + avatarHTML
          + '<span class="text-xs">' + tag + '</span>'
          + '<span class="flex items-center gap-0.5 text-textAssist text-[10px] ml-1">'
          +   '<iconify-icon class="text-xs text-primary" icon="solar:like-bold"></iconify-icon>'
          +   likes[i]
          + '</span>'
          + '</div>';
      }
    });

    var discussHTML = ''
      + '<div class="bg-white rounded-2xl p-4 dna-card-glow">'
      +   '<div class="flex items-center justify-between mb-3">'
      +     '<div class="font-bold text-sm text-textMain">小' + dna.name + '一样的自己</div>'
      +     '<div class="flex items-center gap-1 bg-primary/10 text-primary text-[10px] font-bold px-2.5 py-1 rounded-full">'
      +       '<iconify-icon class="text-xs" icon="solar:users-group-rounded-bold-duotone"></iconify-icon>'
      +       '<span>9121鲤友正在讨论</span>'
      +       '<iconify-icon class="text-xs" icon="solar:alt-arrow-right-linear"></iconify-icon>'
      +     '</div>'
      +   '</div>'
      +   '<div class="flex flex-wrap gap-2 mb-4">'
      +     tagsHTML
      +   '</div>'
      +   '<div class="border-t border-gray-100 pt-3 mb-3">'
      +     '<div class="text-xs font-bold text-textMain mb-2">与其他类型的关系</div>'
      +     '<div class="flex gap-3">'
      +       '<div class="flex-1 bg-bgMain rounded-xl p-2.5 flex items-center gap-2">'
      +         '<div class="text-[10px] text-textAssist">和我是同类</div>'
      +         '<div class="text-sm font-bold text-textMain">' + dna.sameType + '</div>'
      +       '</div>'
      +       '<div class="flex-1 bg-bgMain rounded-xl p-2.5 flex items-center gap-2">'
      +         '<div class="text-[10px] text-textAssist">不打不相识</div>'
      +         '<div class="text-sm font-bold text-textMain">' + dna.relationType + ' ' + dna.relationEmoji + '</div>'
      +       '</div>'
      +     '</div>'
      +   '</div>'
      +   '<a href="copytrade.html" class="block bg-gradient-to-r from-primary/10 to-secondary/5 rounded-xl p-3 text-center border border-primary/15">'
      +     '<span class="text-xs font-bold text-textMain">看看朋友们感兴趣的作业本</span>'
      +     '<span class="text-xs text-primary font-bold ml-1">点击查看 &gt;</span>'
      +   '</a>'
      + '</div>';

    section.innerHTML = ''
      + '<div class="px-4">'
      +   '<div class="flex items-center justify-center gap-2 mb-3">'
      +     '<div class="dna-mode-tab active" id="tab-solo" onclick="switchDnaMode(\'solo\')">独处模式</div>'
      +     '<div class="dna-mode-tab" id="tab-discuss" onclick="switchDnaMode(\'discuss\')">讨论模式</div>'
      +   '</div>'
      +   '<div id="dna-solo-content">'
      +     soloHTML
      +   '</div>'
      +   '<div id="dna-discuss-content" class="hidden">'
      +     discussHTML
      +   '</div>'
      + '</div>';
  }

  // ========== Switch DNA Mode ==========
  function switchDnaMode(mode) {
    currentDnaMode = mode;
    var tabSolo = document.getElementById('tab-solo');
    var tabDiscuss = document.getElementById('tab-discuss');
    var soloContent = document.getElementById('dna-solo-content');
    var discussContent = document.getElementById('dna-discuss-content');

    if (mode === 'solo') {
      tabSolo.classList.add('active');
      tabDiscuss.classList.remove('active');
      soloContent.classList.remove('hidden');
      discussContent.classList.add('hidden');
    } else {
      tabDiscuss.classList.add('active');
      tabSolo.classList.remove('active');
      discussContent.classList.remove('hidden');
      soloContent.classList.add('hidden');
    }
  }

  // ========== Render Rankings ==========
  function renderRankings(dnaType) {
    const container = document.getElementById('rankings-container');

    let sorted = [...rankings];
    if (dnaType) {
      sorted.sort((a, b) => {
        const aMatch = a.dnaFit.includes(dnaType) ? 0 : 1;
        const bMatch = b.dnaFit.includes(dnaType) ? 0 : 1;
        return aMatch - bMatch;
      });
    }

    container.innerHTML = sorted.map((item, idx) => {
      const isFit = dnaType && item.dnaFit.includes(dnaType);
      const avatarColors = [
        'from-blue-400 to-indigo-500',
        'from-rose-400 to-pink-500',
        'from-emerald-400 to-teal-500'
      ];
      const colorClass = avatarColors[idx % avatarColors.length];

      return `
        <a href="portfolio.html" class="block bg-white rounded-2xl p-4 shadow-sm border border-gray-100 rank-card relative overflow-hidden">
          ${isFit ? '<div class="absolute top-0 right-0 bg-primary text-white text-[10px] font-bold px-2.5 py-0.5 rounded-bl-xl rounded-tr-2xl">适合你</div>' : ''}
          <div class="flex items-start gap-3">
            <div class="w-11 h-11 rounded-xl bg-gradient-to-br ${colorClass} flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
              ${item.avatar}
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between mb-1">
                <span class="font-bold text-sm text-textMain">${item.name}</span>
                <span class="text-up font-bold text-lg">${item.returnRate}</span>
              </div>
              <div class="flex items-center gap-3 mb-2.5">
                <span class="text-[11px] text-textAssist">最大回撤 <span class="text-down font-medium">${item.maxDrawdown}</span></span>
                <span class="text-[11px] text-textAssist">胜率 <span class="text-textMain font-medium">${item.successRate}</span></span>
              </div>
              <div class="bg-bgMain rounded-lg p-2.5 mb-2">
                <div class="flex items-start gap-1.5">
                  <iconify-icon class="text-primary text-sm mt-0.5 flex-shrink-0" icon="solar:star-bold"></iconify-icon>
                  <span class="text-xs text-textSub leading-relaxed">${item.aiSummary}</span>
                </div>
              </div>
              <div class="flex items-start gap-1.5">
                <iconify-icon class="text-secondary text-xs mt-0.5 flex-shrink-0" icon="solar:users-group-rounded-bold-duotone"></iconify-icon>
                <span class="text-[11px] text-textAssist leading-relaxed">${item.fitReason}</span>
              </div>
            </div>
          </div>
        </a>
      `;
    }).join('');
  }

  // ========== Render Videos ==========
  function renderVideos() {
    const container = document.getElementById('videos-container');
    container.innerHTML = videos.map(v => {
      const encodedTitle = encodeURIComponent(v.title);
      const encodedAuthor = encodeURIComponent(v.author);
      return `
      <a href="video_detail.html?title=${encodedTitle}&author=${encodedAuthor}" class="min-w-[220px] max-w-[220px] video-card">
        <div class="relative rounded-2xl overflow-hidden mb-2">
          <div class="w-full h-[130px] bg-gradient-to-br ${v.gradient} flex items-center justify-center">
            <div class="w-10 h-10 bg-white/30 rounded-full flex items-center justify-center backdrop-blur-sm">
              <iconify-icon class="text-white text-xl ml-0.5" icon="solar:play-bold"></iconify-icon>
            </div>
          </div>
          <div class="absolute bottom-2 right-2 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded-md font-medium">
            ${v.duration}
          </div>
        </div>
        <h3 class="text-sm font-bold text-textMain leading-snug mb-1.5 line-clamp-2">${v.title}</h3>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-1.5">
            <div class="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-[9px] font-bold text-textSub">
              ${v.author.charAt(0)}
            </div>
            <span class="text-[11px] text-textAssist">${v.author}</span>
          </div>
          <div class="flex items-center gap-0.5 text-textAssist">
            <iconify-icon class="text-xs" icon="solar:eye-bold"></iconify-icon>
            <span class="text-[10px]">${v.views}</span>
          </div>
        </div>
      </a>
    `;
    }).join('');
  }

  // ========== AI Panel Toggle ==========
  function toggleAI() {
    const panel = document.getElementById('ai-panel');
    panel.classList.toggle('hidden');
  }

  // ========== Init ==========
  document.addEventListener('DOMContentLoaded', function() {
    const dnaType = getUserDNA();
    renderDailyWidgets(dnaType);
    renderDNAProfile(dnaType);
    renderRankings(dnaType);
    renderVideos();

    document.getElementById('fab').addEventListener('click', toggleAI);
  });
</script>

</body>
</html>
