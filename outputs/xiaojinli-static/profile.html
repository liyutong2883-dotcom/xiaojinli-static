<script>
        const dnaConfig = {
            owl:      { name: '猫头鹰', emoji: '🦉', headline: '认真研究型', description: '你习惯先理解原因再做决定，不容易被情绪带走。' },
            cheetah:  { name: '猎豹',   emoji: '🐆', headline: '行动派',     description: '你决策速度快，对机会敏感，收益预期高。' },
            turtle:   { name: '乌龟',   emoji: '🐢', headline: '稳稳赚钱派', description: '你不喜欢大起大落，更相信时间的力量。' },
            fox:      { name: '狐狸',   emoji: '🦊', headline: '消息雷达',   description: '你喜欢先弄清楚信息再行动，对变化敏感。' },
            squirrel: { name: '松鼠',   emoji: '🐿️', headline: '准备型',     description: '你偏谨慎，愿意从小开始学习。' }
        };

        (function renderDNA() {
            const dna = localStorage.getItem('investmentDna');
            const display = document.getElementById('dna-display');
            const menuEntry = document.getElementById('dna-menu-entry');
            const menuLabel = document.getElementById('dna-menu-label');

            if (dna && dnaConfig[dna]) {
                const info = dnaConfig[dna];
                display.innerHTML = `
                    <div class="flex items-center gap-3 mb-3">
                        <span class="text-3xl">${info.emoji}</span>
                        <div>
                            <div class="font-bold text-base">${info.emoji} ${info.name} · ${info.headline}</div>
                        </div>
                    </div>
                    <p class="text-xs text-textSub leading-relaxed">${info.description}</p>
                `;
                menuEntry.href = 'dna_result.html';
                menuLabel.textContent = info.name;
                menuLabel.classList.add('text-primary', 'font-bold');
                menuLabel.classList.remove('text-textAssist');
            } else {
                display.innerHTML = `
                    <a href="onboarding.html" class="flex items-center gap-2 text-primary text-sm font-bold">
                        <iconify-icon icon="solar:star-bold" class="text-lg"></iconify-icon>
                        <span>还没有投资 DNA，去做测试 →</span>
                    </a>
                `;
                menuEntry.href = 'onboarding.html';
                menuLabel.textContent = '去测试';
                menuLabel.classList.add('text-primary');
                menuLabel.classList.remove('text-textAssist');
            }
        })();
    </script>
