  // ========== Read DNA from localStorage ==========
  function getUserDNA() {
    var raw = localStorage.getItem('investmentDna');
    if (!raw) return null;
    try {
      var parsed = JSON.parse(raw);
      // New format: {animal:"owl", dimensions:{...}}
      if (parsed && typeof parsed === 'object' && parsed.animal) {
        return parsed.animal;
      }
    } catch(e) {}
    // Old format: plain string like "owl"
    return raw;
  }

  // ========== Render Daily Widgets (compact, de-emphasized) ==========
  function renderDailyWidgets(dnaType) {
    const container = document.getElementById('daily-widgets');
    const dna = dnaType && dnaConfig[dnaType] ? dnaConfig[dnaType] : dnaConfig.turtle;

    // Build mini calendar
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const today = now.getDate();
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const noteDays = [5, 12, 20, 25];

    const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
    let calendarHTML = '';
    weekDays.forEach(function(d) {
      calendarHTML += '<div class="text-[8px] text-textAssist text-center">' + d + '</div>';
    });
    for (var e = 0; e < firstDay; e++) {
      calendarHTML += '<div></div>';
    }
    for (var day = 1; day <= daysInMonth; day++) {
      var isToday = day === today;
      var hasNote = noteDays.includes(day);
      calendarHTML += '<div class="relative flex items-center justify-center" style="height:18px;">';
      if (isToday) {
        calendarHTML += '<span class="text-[9px] bg-primary/80 text-white w-4 h-4 rounded-full flex items-center justify-center font-bold">' + day + '</span>';
      } else {
        calendarHTML += '<span class="text-[9px] text-textAssist">' + day + '</span>';
        if (hasNote) {
          calendarHTML += '<div class="calendar-dot"></div>';
        }
      }
      calendarHTML += '</div>';
    }

    container.innerHTML = ''
      + '<div class="grid grid-cols-2 gap-2">'
      + '<div class="bg-white/70 rounded-xl px-3 py-2 border border-gray-100">'
      +   '<div class="flex items-center gap-1 mb-1">'
      +     '<span class="text-[10px]">' + dna.emoji + '</span>'
      +     '<span class="text-[10px] font-medium text-textSub">今日宜忌</span>'
      +   '</div>'
      +   '<div class="flex items-center gap-2">'
      +     '<span class="text-[10px] text-primary font-medium">宜 ' + dna.yi + '</span>'
      +     '<span class="text-[10px] text-textAssist">忌 ' + dna.ji + '</span>'
      +   '</div>'
      + '</div>'
      + '<div class="bg-white/70 rounded-xl px-2.5 py-2 border border-gray-100">'
      +   '<div class="flex items-center justify-between mb-0.5">'
      +     '<span class="text-[10px] font-medium text-textSub">金鲤小记</span>'
      +     '<span class="text-[9px] text-textAssist">' + (month + 1) + '月</span>'
      +   '</div>'
      +   '<div class="grid grid-cols-7 gap-y-0">'
      +     calendarHTML
      +   '</div>'
      + '</div>'
      + '</div>';
  }

  // ========== Toggle DNA Dimensions (expand/collapse) ==========
  function toggleDnaDimensions() {
    var moreDiv = document.getElementById('dna-discuss-more');
    var btn = document.getElementById('dna-expand-btn');
    if (moreDiv.classList.contains('hidden')) {
      moreDiv.classList.remove('hidden');
      btn.textContent = '收起更多维度';
    } else {
      moreDiv.classList.add('hidden');
      btn.textContent = '展开更多维度';
    }
  }

  // ========== Switch DNA Mode ==========
  function switchDnaMode(mode) {
    currentDnaMode = mode;
    var tabSolo = document.getElementById('tab-solo');
    var tabDiscuss = document.getElementById('tab-discuss');
    var soloContent = document.getElementById('dna-solo-content');
    var discussContent = document.getElementById('dna-discuss-content');

    if (mode === 'solo') {
      tabSolo.classList.add('active');
      tabDiscuss.classList.remove('active');
      soloContent.classList.remove('hidden');
      discussContent.classList.add('hidden');
    } else {
      tabDiscuss.classList.add('active');
      tabSolo.classList.remove('active');
      discussContent.classList.remove('hidden');
      soloContent.classList.add('hidden');
    }
  }

            </div>
          </div>
          <div class="absolute bottom-2 right-2 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded-md font-medium">
            ${v.duration}
          </div>
        </div>
        <h3 class="text-sm font-bold text-textMain leading-snug mb-1.5 line-clamp-2">${v.title}</h3>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-1.5">
            <div class="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-[9px] font-bold text-textSub">
              ${v.author.charAt(0)}
            </div>
            <span class="text-[11px] text-textAssist">${v.author}</span>
          </div>
          <div class="flex items-center gap-0.5 text-textAssist">
            <iconify-icon class="text-xs" icon="solar:eye-bold"></iconify-icon>
            <span class="text-[10px]">${v.views}</span>
          </div>
        </div>
      </a>
    `;
    }).join('');
  }

  // ========== AI Panel Toggle ==========
  function toggleAI() {
    const panel = document.getElementById('ai-panel');
    panel.classList.toggle('hidden');
  }

  // ========== Init ==========
  document.addEventListener('DOMContentLoaded', function() {
    const dnaType = getUserDNA();
    renderDailyWidgets(dnaType);
    renderDNAProfile(dnaType);
    renderRankings(dnaType);
    renderVideos();

    document.getElementById('fab').addEventListener('click', toggleAI);
  });
</script>

</body>
</html>
