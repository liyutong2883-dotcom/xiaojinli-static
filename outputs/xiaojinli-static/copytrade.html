          squirrel: { decision:'following', action:'cautious', returns:'stable', risk:'conservative', learning:'growing', info:'ai', emotion:'normal', goals:'selfgrowth', horizon:'long' }
        };

        // 读取 DNA 并更新排序标签

              catch(e) { dna = raw; }
            }
            const labelEl = document.getElementById('dna-sort-label');
            if (dna && dnaConfig[dna]) {
                labelEl.textContent = '按 DNA 匹配排序：' + dnaConfig[dna].label;
            } else {
                labelEl.textContent = '按 DNA 匹配排序';
            }
        })();

                { id: 2, name: '易方达蓝筹', avatar: 'EF', successRate: '59%', maxDrawdown: '-21.7%', riskLevel: '中等波动', fit: '适合核心资产配置', sampleSize: '38次调仓', disclosureLag: '季报滞后45天', tags: ['大牛', '消费医药', '大盘成长'], followed: false, dnaFit: ['cheetah', 'fox'], dnaDimensions: {decision:'intuitive', action:'rhythmic', returns:'aggressive', risk:'balanced'}, fitReason: '为什么推荐给你：消费龙头集中持仓，适合看好内需复苏、能承受短期波动的用户。' },
                { id: 3, name: '兴证全球', avatar: 'XQ', successRate: '61%', maxDrawdown: '-19.6%', riskLevel: '中低波动', fit: '适合均衡跟随', sampleSize: '44次调仓', disclosureLag: '季报滞后45天', tags: ['大牛', '均衡配置', '制造科技'], followed: false, dnaFit: ['turtle', 'squirrel'], dnaDimensions: {decision:'rational', action:'rhythmic', returns:'stable', risk:'balanced'}, fitReason: '为什么推荐给你：行业分散、风格均衡，适合刚入门、不想押注单一赛道的用户。' },
                { id: 4, name: '中欧医疗', avatar: 'ZO', successRate: '52%', maxDrawdown: '-32.8%', riskLevel: '高波动', fit: '适合高风险偏好', sampleSize: '36次调仓', disclosureLag: '季报滞后45天', tags: ['大牛', '医疗创新', '行业集中'], followed: true, dnaFit: ['cheetah', 'fox'], dnaDimensions: {decision:'intuitive', action:'active', returns:'aggressive', risk:'aggressive'}, fitReason: '为什么推荐给你：高弹性医疗赛道，适合对行业有判断、能承受大回撤的用户。' },
                { id: 5, name: '富国长期', avatar: 'FG', successRate: '57%', maxDrawdown: '-23.5%', riskLevel: '中等波动', fit: '适合全市场配置', sampleSize: '40次调仓', disclosureLag: '季报滞后45天', tags: ['大牛', '老牌主动', '全市场'], followed: false, dnaFit: ['owl', 'squirrel'], dnaDimensions: {decision:'rational', action:'cautious', returns:'longterm', risk:'balanced'}, fitReason: '为什么推荐给你：全市场选股、长期持有逻辑清晰，适合喜欢理解"为什么买"再跟的用户。' },
                // 游资
                { id: 6, name: '章盟主', avatar: 'ZM', successRate: '48%', maxDrawdown: '-36.2%', riskLevel: '高波动', fit: '适合短线纪律强', sampleSize: '126次上榜', disclosureLag: '龙虎榜T+1', tags: ['游资', '题材主线', '高换手'], followed: false, dnaFit: ['fox', 'cheetah'], dnaDimensions: {decision:'intuitive', action:'active', returns:'aggressive', risk:'aggressive'}, fitReason: '为什么推荐给你：题材主线敏感度高，适合对消息面反应快、有纪律的用户。' },
                { id: 7, name: '方新侠', avatar: 'FX', successRate: '46%', maxDrawdown: '-34.9%', riskLevel: '高波动', fit: '适合趋势交易', sampleSize: '98次上榜', disclosureLag: '龙虎榜T+1', tags: ['游资', '趋势主升', '容量票'], followed: true, dnaFit: ['cheetah', 'fox'], dnaDimensions: {decision:'intuitive', action:'active', returns:'aggressive', risk:'aggressive'}, fitReason: '为什么推荐给你：趋势主升浪选手，适合决策快、敢追涨的用户。' },
                { id: 8, name: '作手新一', avatar: 'ZX', successRate: '44%', maxDrawdown: '-38.7%', riskLevel: '极高波动', fit: '适合题材跟踪', sampleSize: '112次上榜', disclosureLag: '龙虎榜T+1', tags: ['游资', '接力博弈', '情绪周期'], followed: false, dnaFit: ['fox'], dnaDimensions: {decision:'following', action:'active', returns:'aggressive', risk:'aggressive'}, fitReason: '为什么推荐给你：情绪周期博弈，适合信息灵通、对题材有判断的用户。' },
                // 私募
                { id: 9, name: '高毅资产', avatar: 'GY', successRate: '58%', maxDrawdown: '-20.3%', riskLevel: '中等波动', fit: '适合低估值配置', sampleSize: '31次披露', disclosureLag: '定报滞后60天', tags: ['私募', '深度调研', '低估值'], followed: true, dnaFit: ['turtle', 'owl'], dnaDimensions: {decision:'rational', action:'cautious', returns:'longterm', risk:'conservative'}, fitReason: '为什么推荐给你：深度调研+低估值逻辑，适合相信"买得便宜"的用户。' },
                { id: 10, name: '景林资产', avatar: 'JL', successRate: '55%', maxDrawdown: '-24.1%', riskLevel: '中高波动', fit: '适合全球消费配置', sampleSize: '29次披露', disclosureLag: '定报滞后60天', tags: ['私募', '消费科技', '全球视角'], followed: false, dnaFit: ['cheetah', 'owl'], dnaDimensions: {decision:'rational', action:'rhythmic', returns:'aggressive', risk:'balanced'}, fitReason: '为什么推荐给你：全球视角配置消费科技，适合想分散地域风险的用户。' },
                { id: 11, name: '淡水泉', avatar: 'DS', successRate: '53%', maxDrawdown: '-22.6%', riskLevel: '中等波动', fit: '适合逆向配置', sampleSize: '27次披露', disclosureLag: '定报滞后60天', tags: ['私募', '逆向投资', '周期修复'], followed: false, dnaFit: ['fox', 'turtle'], dnaDimensions: {decision:'following', action:'cautious', returns:'longterm', risk:'balanced'}, fitReason: '为什么推荐给你：逆向布局周期修复，适合能忍受短期浮亏、等风来的用户。' }
            ];

        function getDimensionMatches(itemDims) {
            var raw = localStorage.getItem('investmentDna');
            var userAnimal = null;
            if (raw) {
              try { var parsed = JSON.parse(raw); userAnimal = typeof parsed === 'object' ? parsed.animal : raw; }
              catch(e) { userAnimal = raw; }
            }
            if (!userAnimal || !dnaDimensionMap[userAnimal]) return [];
            var userDims = dnaDimensionMap[userAnimal];
            var dimLabels = {decision:'决策',action:'行动',returns:'收益',risk:'风险'};
            var matches = [];
            for (var key in itemDims) {
              if (userDims[key] === itemDims[key] && dimLabels[key]) {
                matches.push(dimLabels[key]);
              }
            }
            return matches;
        }

        function renderList() {
            const container = document.getElementById('list-container');
            const data = mockData;
            container.innerHTML = data.map((item, index) => `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-50 active:bg-gray-50 transition-colors overflow-hidden" onclick="location.href='portfolio.html?id=${item.id}'">
                    <!-- Hero Section: 核心指标 -->
                    <div class="px-4 pt-4 pb-3 relative">
                        ${index < 3 ? `<div class="absolute top-3 left-3 w-6 h-6 ${index === 0 ? 'bg-yellow-400' : index === 1 ? 'bg-gray-300' : 'bg-orange-400'} rounded-full flex items-center justify-center text-[10px] text-white font-bold border-2 border-white">${index + 1}</div>` : ''}
                        
                        <!-- 主体信息：头像 + 名称 + 胜率 -->
                        <div class="flex items-center gap-3 mb-3 mt-1">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-primary/20 to-secondary/20 flex items-center justify-center font-bold text-primary text-sm flex-shrink-0 border-2 border-primary/30">
                                ${item.avatar}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="font-bold text-base text-textMain truncate">${item.name}</div>
                                <div class="text-[10px] text-textAssist mt-0.5">${item.sampleSize} · ${item.disclosureLag}</div>
                            </div>
                            <div class="text-right flex-shrink-0 mr-2">
                                <div class="text-3xl font-black text-up leading-none">${item.successRate}</div>
                                <div class="text-[9px] text-textAssist mt-1">胜率</div>
                            </div>
                            <button onclick="event.stopPropagation(); toggleFollow(this)" class="text-[10px] px-3 py-1.5 rounded-full border flex-shrink-0 ${item.followed ? 'bg-gray-100 text-textAssist border-gray-100' : 'border-primary text-primary font-medium'}">
                                ${item.followed ? '已关注' : '+ 关注'}
                            </button>
                        </div>
                        
                        <!-- 次要指标：回撤 + 风险 -->
                        <div class="flex items-center justify-between bg-bgMain rounded-lg px-3 py-2">
                            <div class="flex items-center gap-2">
                                <iconify-icon icon="solar:trending-down-linear" class="text-down text-lg"></iconify-icon>
                                <div>
                                    <div class="text-[9px] text-textAssist">最大回撤</div>
                                    <div class="text-xs font-bold text-down">${item.maxDrawdown}</div>
                                </div>
                            </div>
                            <div class="h-8 w-px bg-gray-200"></div>
                            <div class="flex items-center gap-2">
                                <iconify-icon icon="solar:shield-linear" class="text-secondary text-lg"></iconify-icon>
                                <div>
                                    <div class="text-[9px] text-textAssist">风险等级</div>
                                    <div class="text-xs font-bold text-textMain">${item.riskLevel}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Tags -->
                    <div class="px-4 pb-3 flex flex-wrap gap-1.5 border-t border-gray-50 pt-3">
                        ${item.tags.map(tag => `<span class="text-[10px] bg-bgMain px-2 py-1 rounded-md text-textSub">${tag}</span>`).join('')}
                    </div>
                    
                    <!-- AI 推荐理由 -->
                    <div class="px-4 pb-3">
                        <div class="bg-primary/5 rounded-xl p-3 flex items-start gap-2">
                            <iconify-icon icon="solar:star-bold" class="text-primary text-base mt-0.5 flex-shrink-0"></iconify-icon>
                            <span class="text-[11px] text-textSub leading-relaxed">${item.fitReason}</span>
                        </div>
                    </div>
                    
                    <!-- DNA 匹配标签 -->
                    ${getDimensionMatches(item.dnaDimensions).length > 0 ? `
                    <div class="px-4 pb-3 flex flex-wrap gap-1.5">
                      ${getDimensionMatches(item.dnaDimensions).map(m => `<span class="text-[10px] bg-primary/10 text-primary px-2 py-1 rounded-md font-medium">${m} ✓</span>`).join('')}
                    </div>` : ''}
                    
                    <!-- Footer CTA -->
                    <div class="px-4 pb-4 flex items-center justify-end border-t border-dashed border-gray-100 pt-3">
                        <div class="text-[11px] text-primary flex items-center gap-1 font-bold">
                            查看持仓
                            <iconify-icon icon="solar:alt-arrow-right-linear" class="text-base"></iconify-icon>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleFollow(btn) {
            if (btn.innerText === '+ 关注') {
                btn.innerText = '已关注';
                btn.classList.remove('border-primary', 'text-primary');
                btn.classList.add('bg-gray-100', 'text-textAssist', 'border-gray-100');
            } else {
                btn.innerText = '+ 关注';
                btn.classList.add('border-primary', 'text-primary');
                btn.classList.remove('bg-gray-100', 'text-textAssist', 'border-gray-100');
            }
        }

        // 初始渲染
        renderList();
    </script>
