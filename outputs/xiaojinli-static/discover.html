        +   '<div class="dm-avatar ' + (post.avatarBg || avatarBgs[i % avatarBgs.length]) + '">' + (post.avatar || '👤') + '</div>'
        +   '<span class="dm-text">' + post.text + '</span>'
        +   '<span class="dm-likes"><iconify-icon class="text-sm" icon="solar:like-bold"></iconify-icon>' + post.likes + '</span>'
        + '</div>'
        + '</div>';
    });
    // "我也想说" bubble
    bubblesHTML += '<div class="dm-row dm-left">'
      + '<div class="dm-say">'
      +   '<div class="dm-say-icon"><iconify-icon class="text-sm text-white" icon="solar:add-circle-bold"></iconify-icon></div>'
      +   '<span>我也想说说...</span>'
      + '</div>'
      + '</div>';
    // Sparkle decoration
    bubblesHTML += '<div class="dm-sparkle">✦  ✦</div>';

    var discussHTML = ''
      + '<div class="rounded-2xl p-4 dna-card-glow" style="background:linear-gradient(180deg,#FFF9EC 0%,#FFF5E0 100%);">'
      +   '<div class="flex items-center justify-between mb-4">'
      +     '<div class="font-bold text-sm" style="color:#5C3D1A">小' + dna.name + '们的日常</div>'
      +     '<div class="flex items-center gap-1 bg-primary/10 text-primary text-[10px] font-bold px-2.5 py-1 rounded-full">'
      +       '<iconify-icon class="text-xs" icon="solar:users-group-rounded-bold-duotone"></iconify-icon>'
      +       '<span>9121鲤友</span>'
      +       '<iconify-icon class="text-xs" icon="solar:alt-arrow-right-linear"></iconify-icon>'
      +     '</div>'
      +   '</div>'
      // Bubbles
      +   '<div class="mb-3">'
      +     bubblesHTML
      +   '</div>'
      // Merged returns strip — compact, inline with the card
      +   '<div class="flex items-center gap-2 bg-bgMain rounded-xl px-3 py-2 mb-3">'
      +     '<span class="text-[10px] text-textAssist flex-shrink-0">今天' + dna.emoji + '加关注最多</span>'
      +     '<div class="flex items-center gap-2 flex-1">'
      +       '<span class="text-xs font-bold text-textMain">银行 ETF</span>'
      +       '<span class="text-xs font-bold text-up">+7.8%</span>'
      +     '</div>'
      +   '</div>'
      +   '<div class="border-t border-gray-100 pt-3 mb-3">'
      +     '<div class="text-xs font-bold text-textMain mb-2">与其他类型的关系</div>'
      +     '<div class="flex gap-3">'
      +       '<div class="flex-1 bg-bgMain rounded-xl p-2.5 flex items-center gap-2">'
      +         '<div class="text-[10px] text-textAssist">和我是同类</div>'
      +         '<div class="text-sm font-bold text-textMain">' + dna.sameType + '</div>'
      +       '</div>'
      +       '<div class="flex-1 bg-bgMain rounded-xl p-2.5 flex items-center gap-2">'
      +         '<div class="text-[10px] text-textAssist">不打不相识</div>'
      +         '<div class="text-sm font-bold text-textMain">' + dna.relationType + ' ' + dna.relationEmoji + '</div>'
      +       '</div>'
      +     '</div>'
      +   '</div>'
      + '</div>';

    section.innerHTML = ''
      + '<div class="px-4">'
      +   '<div class="flex items-center justify-center gap-2 mb-3">'
      +     '<div class="dna-mode-tab active" id="tab-solo" onclick="switchDnaMode(\'solo\')">我的今日</div>'
      +     '<div class="dna-mode-tab" id="tab-discuss" onclick="switchDnaMode(\'discuss\')">投小圈</div>'
      +   '</div>'
      +   '<div id="dna-solo-content" class="dna-tab-content">'
      +     soloHTML
      +   '</div>'
      +   '<div id="dna-discuss-content" class="hidden dna-tab-content">'
      +     discussHTML
      +   '</div>'
      + '</div>';
  }

  // ========== Switch DNA Mode ==========
  function switchDnaMode(mode) {
    currentDnaMode = mode;
    var tabSolo = document.getElementById('tab-solo');
    var tabDiscuss = document.getElementById('tab-discuss');
    var soloContent = document.getElementById('dna-solo-content');
    var discussContent = document.getElementById('dna-discuss-content');

    if (mode === 'solo') {
      tabSolo.classList.add('active');
      tabDiscuss.classList.remove('active');
      soloContent.classList.remove('hidden');
      discussContent.classList.add('hidden');
    } else {
      tabDiscuss.classList.add('active');
      tabSolo.classList.remove('active');
      discussContent.classList.remove('hidden');
      soloContent.classList.add('hidden');
    }
  }

  // ========== Render Rankings ==========
  function renderRankings(dnaType) {
    const container = document.getElementById('rankings-container');

    // Sort by return rate descending
    let sorted = [...rankings].sort((a, b) => {
      return parseFloat(b.returnRate) - parseFloat(a.returnRate);
    });

    container.innerHTML = sorted.map((item, idx) => {
      const isFit = dnaType && item.dnaFit.includes(dnaType);
      const avatarColors = [
        'from-blue-400 to-indigo-500',
        'from-rose-400 to-pink-500',
        'from-emerald-400 to-teal-500'
      ];
      const colorClass = avatarColors[idx % avatarColors.length];

      return `
        <a href="portfolio.html" class="block bg-white rounded-2xl p-4 shadow-sm border border-gray-100 rank-card relative overflow-hidden">
          ${isFit ? '<div class="absolute top-0 right-0 bg-primary text-white text-[10px] font-bold px-2.5 py-0.5 rounded-bl-xl rounded-tr-2xl">适合你</div>' : ''}
          <div class="flex items-start gap-3">
            <div class="w-11 h-11 rounded-xl bg-gradient-to-br ${colorClass} flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
              ${item.avatar}
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between mb-1">
                <span class="font-bold text-sm text-textMain">${item.name}</span>
                <div class="text-right">
                  <span class="text-[9px] text-textAssist block leading-none">今日收益率</span>
                  <span class="text-up font-bold text-lg">${item.returnRate}</span>
                </div>
              </div>
              <div class="flex items-center gap-3 mb-2.5">
                <span class="text-[11px] text-textAssist">最大回撤 <span class="text-down font-medium">${item.maxDrawdown}</span></span>
                <span class="text-[11px] text-textAssist">胜率 <span class="text-textMain font-medium">${item.successRate}</span></span>
              </div>
              <div class="bg-bgMain rounded-lg p-2.5 mb-2">
                <div class="flex items-start gap-1.5">
                  <iconify-icon class="text-primary text-sm mt-0.5 flex-shrink-0" icon="solar:star-bold"></iconify-icon>
                  <span class="text-xs text-textSub leading-relaxed">${item.aiSummary}</span>
                </div>
              </div>
              <div class="flex items-start gap-1.5">
                <iconify-icon class="text-secondary text-xs mt-0.5 flex-shrink-0" icon="solar:dna-bold-duotone"></iconify-icon>
                <span class="text-[11px] text-textAssist leading-relaxed">${item.fitReason}</span>
              </div>
            </div>
          </div>
        </a>
      `;
    }).join('');
  }

  // ========== Render Videos ==========
  function renderVideos() {
    const container = document.getElementById('videos-container');
    container.innerHTML = videos.map(v => {
      const encodedTitle = encodeURIComponent(v.title);
      const encodedAuthor = encodeURIComponent(v.author);

      return `
      <div class="min-w-[220px] max-w-[220px]">
        <a href="video_detail.html?title=${encodedTitle}&author=${encodedAuthor}" class="block video-card">
          <div class="relative rounded-2xl overflow-hidden mb-2">
            <div class="w-full h-[130px] bg-gradient-to-br ${v.gradient} flex items-center justify-center">
              <div class="w-10 h-10 bg-white/30 rounded-full flex items-center justify-center backdrop-blur-sm">
                <iconify-icon class="text-white text-xl ml-0.5" icon="solar:play-bold"></iconify-icon>
              </div>
            </div>
            <div class="absolute bottom-2 right-2 bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded-md font-medium">
              ${v.duration}
            </div>
          </div>
          <h3 class="text-sm font-bold text-textMain leading-snug mb-1.5 line-clamp-2">${v.title}</h3>
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-1.5">
              <div class="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-[9px] font-bold text-textSub">
                ${v.author.charAt(0)}
              </div>
              <span class="text-[11px] text-textAssist">${v.author}</span>
              <span class="text-[9px] bg-primary/10 text-primary px-1 py-0.5 rounded">AI分身</span>
            </div>
            <div class="flex items-center gap-0.5 text-textAssist">
              <iconify-icon class="text-xs" icon="solar:eye-bold"></iconify-icon>
              <span class="text-[10px]">${v.views}</span>
            </div>
          </div>
        </a>
      </div>
    `;
    }).join('');
  }

  // ========== AI Panel Toggle ==========
  function toggleAI() {
    const panel = document.getElementById('ai-panel');
    panel.classList.toggle('hidden');
  }

  // ========== 首次访问引导 ==========
  function dismissGuide(page) {
    localStorage.setItem('guide_' + page + '_shown', '1');
    var el = document.getElementById('guide-' + page);
    if (el) el.classList.add('hidden');
  }

  // ========== 通知弹窗 ==========
  function closeNotification() {
    document.getElementById('notification-modal').classList.add('hidden');
  }

  // ========== Init ==========
  document.addEventListener('DOMContentLoaded', function() {
    const dnaType = getUserDNA();

    // 未做 DNA 测试 → 自动弹出问卷
    if (!dnaType) {
      window.location.href = 'onboarding.html';
      return;
    }

    renderDNAProfile(dnaType);
    renderRankings(dnaType);
    renderVideos();

    document.getElementById('fab').addEventListener('click', toggleAI);

    // 通知铃铛点击
    document.getElementById('bell-btn').addEventListener('click', function() {
      document.getElementById('notification-modal').classList.remove('hidden');
    });

    // 首次访问引导气泡
    if (!localStorage.getItem('guide_discover_shown')) {
      document.getElementById('guide-discover').classList.remove('hidden');
    }
  });
</script>

</body>
</html>
