<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>小金鲤 - 自选</title>
<script src="assets/vendor/tailwindcss.js"></script>
<script src="assets/vendor/iconify-icon.min.js"></script>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFB800',
                        secondary: '#FF6B00',
                        bgMain: '#F8F9FC',
                        up: '#FF4D4F',
                        down: '#52C41A',
                        textMain: '#1A1A2E',
                        textSub: '#666666',
                        textAssist: '#999999'
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .wl-tab-active { color: #FFB800; border-bottom: 2px solid #FFB800; font-weight: 700; }
    </style>
</head>
<body class="bg-bgMain text-textMain">
<div class="max-w-[414px] mx-auto min-h-screen flex flex-col relative bg-bgMain shadow-xl">
<!-- 顶部品牌栏 -->
<header class="sticky top-0 z-50 bg-primary px-4 py-3 flex justify-between items-center shadow-md text-white">
<div class="flex items-center gap-3">
<button onclick="history.back()"><iconify-icon class="text-2xl" icon="solar:alt-arrow-left-linear"></iconify-icon></button>
<span class="font-bold text-lg">自选</span>
</div>
<div class="flex items-center gap-3">
<iconify-icon class="text-xl" icon="solar:magnifer-linear"></iconify-icon>
<iconify-icon class="text-xl" icon="solar:sort-horizontal-linear"></iconify-icon>
</div>
</header>

<main class="flex-1 overflow-y-auto pb-24">
<!-- Tab 切换 -->
<div class="bg-white px-6 flex gap-6 border-b border-gray-100 sticky top-[52px] z-40">
<button class="py-3 text-sm wl-tab-active" onclick="switchTab(this,'stocks')">股票 <span class="text-[10px] text-textAssist font-normal">(8)</span></button>
<button class="py-3 text-sm text-textSub" onclick="switchTab(this,'funds')">基金 <span class="text-[10px] text-textAssist font-normal">(4)</span></button>
</div>

<!-- ===== 股票列表 ===== -->
<div id="panel-stocks">
<!-- 大盘概览 -->
<div class="px-4 pt-4 pb-2">
<div class="bg-white rounded-xl p-3 flex items-center justify-between shadow-sm border border-gray-50">
<div class="flex items-center gap-4">
<div>
<div class="text-[10px] text-textAssist">上证指数</div>
<div class="text-sm font-bold text-up">3,286.53</div>
<div class="text-[10px] text-up">+1.24%</div>
</div>
<div class="w-px h-8 bg-gray-100"></div>
<div>
<div class="text-[10px] text-textAssist">深证成指</div>
<div class="text-sm font-bold text-up">10,458.21</div>
<div class="text-[10px] text-up">+0.87%</div>
</div>
</div>
<div class="text-right">
<div class="text-[10px] text-textAssist">今日自选均涨</div>
<div class="text-lg font-black text-up">+2.36%</div>
</div>
</div>
</div>

<!-- 股票列表 -->
<div class="px-4 space-y-2 pt-2" id="stock-list">
<!-- JS 渲染 -->
</div>
</div>

<!-- ===== 基金列表 ===== -->
<div id="panel-funds" class="hidden">
<div class="px-4 pt-4 space-y-2" id="fund-list">
<!-- JS 渲染 -->
</div>
</div>
</main>

<!-- 底部导航 -->
<nav class="fixed bottom-0 w-full max-w-[414px] bg-white/80 backdrop-blur-md border-t border-gray-100 px-4 py-3 flex justify-between items-center z-50 safe-bottom">
<a class="flex flex-col items-center gap-1 text-textAssist" href="discover.html">
<iconify-icon class="text-2xl" icon="solar:home-smile-angle-linear"></iconify-icon>
<span class="text-[10px]">发现</span>
</a>
<a class="flex flex-col items-center gap-1 text-textAssist" href="copytrade.html">
<iconify-icon class="text-2xl" icon="solar:copy-bold"></iconify-icon>
<span class="text-[10px]">广场</span>
</a>
<a class="flex flex-col items-center gap-1 text-textAssist" href="toolbox.html">
<iconify-icon class="text-2xl" icon="solar:lightbulb-bold"></iconify-icon>
<span class="text-[10px]">灵感</span>
</a>
<a class="flex flex-col items-center gap-1 text-textAssist" href="profile.html">
<iconify-icon class="text-2xl" icon="solar:user-bold"></iconify-icon>
<span class="text-[10px]">我的</span>
</a>
</nav>
<!-- 全局浮窗 -->
<div class="fixed right-4 bottom-24 z-[60] cursor-pointer" onclick="location.href='ai_assistant.html'">
<div class="w-14 h-14 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center shadow-lg border-2 border-white">
<span class="text-2xl">🐟</span>
</div>
</div>
</div>
<script>
    const stocks = [
        { name: '中际旭创', code: '300308', price: 168.52, change: '+6.12%', up: true, held: 200, profit: '+1,240.00', profitPct: '+4.3%', sector: '光模块' },
        { name: '阳光电源', code: '300274', price: 98.76, change: '+4.76%', up: true, held: 100, profit: '+680.00', profitPct: '+7.2%', sector: '光伏设备' },
        { name: '宁德时代', code: '300750', price: 189.52, change: '+5.24%', up: true, held: 300, profit: '+2,130.00', profitPct: '+3.9%', sector: '锂电池' },
        { name: '贵州茅台', code: '600519', price: 1526.00, change: '-0.82%', up: false, held: 50, profit: '-620.00', profitPct: '-0.8%', sector: '白酒' },
        { name: '比亚迪', code: '002594', price: 268.40, change: '+3.15%', up: true, held: 150, profit: '+1,560.00', profitPct: '+4.1%', sector: '新能源车' },
        { name: '招商银行', code: '600036', price: 35.82, change: '+0.56%', up: true, held: 500, profit: '+210.00', profitPct: '+1.2%', sector: '银行' },
        { name: '新易盛', code: '300502', price: 82.30, change: '+7.88%', up: true, held: 200, profit: '+1,860.00', profitPct: '+12.1%', sector: '光模块' },
        { name: '中国平安', code: '601318', price: 48.15, change: '-1.23%', up: false, held: 400, profit: '-480.00', profitPct: '-2.4%', sector: '保险' }
    ];

    const funds = [
        { name: '沪深300ETF', code: '510300', nav: 4.1256, change: '+1.52%', up: true, held: 5000, profit: '+750.00', profitPct: '+3.6%', type: '指数型' },
        { name: '中证500ETF', code: '510500', nav: 6.8932, change: '+0.87%', up: true, held: 3000, profit: '+320.00', profitPct: '+1.5%', type: '指数型' },
        { name: '通信ETF', code: '515880', nav: 1.2450, change: '+2.48%', up: true, held: 10000, profit: '+1,240.00', profitPct: '+11.2%', type: '行业型' },
        { name: '半导体ETF', code: '512480', nav: 0.9823, change: '+3.67%', up: true, held: 8000, profit: '+890.00', profitPct: '+9.8%', type: '行业型' }
    ];

    function renderStocks() {
        document.getElementById('stock-list').innerHTML = stocks.map(function(s) {
            return '<div class="bg-white rounded-xl p-3 shadow-sm border border-gray-50 flex items-center justify-between cursor-pointer" onclick="location.href=\'stock_detail.html\'">' +
                '<div class="flex items-center gap-3">' +
                '<div class="w-10 h-10 rounded-lg ' + (s.up ? 'bg-up/10' : 'bg-down/10') + ' flex items-center justify-center text-sm font-bold ' + (s.up ? 'text-up' : 'text-down') + '">' + s.name.charAt(0) + '</div>' +
                '<div>' +
                '<div class="text-sm font-bold">' + s.name + '</div>' +
                '<div class="text-[10px] text-textAssist">' + s.code + ' · ' + s.sector + ' · 持有 ' + s.held + '股</div>' +
                '</div></div>' +
                '<div class="text-right">' +
                '<div class="text-sm font-bold ' + (s.up ? 'text-up' : 'text-down') + '">' + s.price.toFixed(2) + '</div>' +
                '<div class="text-[10px] ' + (s.up ? 'text-up' : 'text-down') + '">' + s.change + ' · 盈亏 <strong>' + s.profit + '</strong> (' + s.profitPct + ')</div>' +
                '</div></div>';
        }).join('');
    }

    function renderFunds() {
        document.getElementById('fund-list').innerHTML = funds.map(function(f) {
            return '<div class="bg-white rounded-xl p-3 shadow-sm border border-gray-50 flex items-center justify-between">' +
                '<div class="flex items-center gap-3">' +
                '<div class="w-10 h-10 rounded-lg ' + (f.up ? 'bg-up/10' : 'bg-down/10') + ' flex items-center justify-center text-sm font-bold ' + (f.up ? 'text-up' : 'text-down') + '">' + f.name.charAt(0) + '</div>' +
                '<div>' +
                '<div class="text-sm font-bold">' + f.name + '</div>' +
                '<div class="text-[10px] text-textAssist">' + f.code + ' · ' + f.type + ' · 持有 ' + f.held.toLocaleString() + '份</div>' +
                '</div></div>' +
                '<div class="text-right">' +
                '<div class="text-sm font-bold ' + (f.up ? 'text-up' : 'text-down') + '">' + f.nav.toFixed(4) + '</div>' +
                '<div class="text-[10px] ' + (f.up ? 'text-up' : 'text-down') + '">' + f.change + ' · 盈亏 <strong>' + f.profit + '</strong> (' + f.profitPct + ')</div>' +
                '</div></div>';
        }).join('');
    }

    function switchTab(btn, panel) {
        document.querySelectorAll('#panel-stocks, #panel-funds').forEach(function(p) { p.classList.add('hidden'); });
        document.getElementById('panel-' + panel).classList.remove('hidden');
        var tabs = btn.parentNode.querySelectorAll('button');
        for (var i = 0; i < tabs.length; i++) {
            tabs[i].classList.remove('wl-tab-active');
            tabs[i].classList.add('text-textSub');
        }
        btn.classList.add('wl-tab-active');
        btn.classList.remove('text-textSub');
    }

    renderStocks();
    renderFunds();
</script>
</body>
</html>
