  // ========== Read DNA from localStorage ==========
  function getUserDNA() {
    var raw = localStorage.getItem('investmentDna');
    if (!raw) return null;
    try {
      var parsed = JSON.parse(raw);
      // New format: {animal:"owl", dimensions:{...}}
      if (parsed && typeof parsed === 'object' && parsed.animal) {
        return parsed.animal;
      }
    } catch(e) {}
    // Old format: plain string like "owl"
    return raw;
  }

  // ========== Tab 切换 ==========
  function switchDiscoverTab(btn, tabId) {
    var tabs = document.querySelectorAll('#discover-tabs .dna-mode-tab');
    tabs.forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('dna-profile-section').classList.toggle('hidden', tabId !== 'today');
    document.getElementById('circle-section').classList.toggle('hidden', tabId !== 'circle');
    // 排行榜和视频只在"我的今日"下显示
    var rankingSection = document.getElementById('dna-profile-section').nextElementSibling;
    while (rankingSection && rankingSection.id !== 'circle-section') {
      if (rankingSection.tagName === 'SECTION') {
        rankingSection.classList.toggle('hidden', tabId !== 'today');
      }
      rankingSection = rankingSection.nextElementSibling;
    }
    if (tabId === 'circle') {
      renderTouXiaoQuan();
    }
  }

  // ========== AI Panel Toggle ==========
  function toggleAI() {
    const panel = document.getElementById('ai-panel');

  // ========== 首次访问引导 ==========
  function dismissGuide(page) {
    localStorage.setItem('guide_' + page + '_shown', '1');
    var el = document.getElementById('guide-' + page);
    if (el) el.classList.add('hidden');
  }

  // ========== 通知弹窗 ==========
  function closeNotification() {
    document.getElementById('notification-modal').classList.add('hidden');
  }

  // ========== Init ==========
  document.addEventListener('DOMContentLoaded', function() {
    const dnaType = getUserDNA();

    // 未做 DNA 测试 → 自动弹出问卷
    if (!dnaType) {
      window.location.href = 'onboarding.html';
      return;
    }

    renderDNAProfile(dnaType);
    renderRankings(dnaType);
    renderVideos();

    document.getElementById('fab').addEventListener('click', toggleAI);

    // 通知铃铛点击
    document.getElementById('bell-btn').addEventListener('click', function() {
      document.getElementById('notification-modal').classList.remove('hidden');
    });

    // 首次访问引导气泡
    if (!localStorage.getItem('guide_discover_shown')) {
      document.getElementById('guide-discover').classList.remove('hidden');
    }
  });

<script id="__tailwind_fouc_fix">
(function(){
  function reveal(){ document.body.style.opacity = '1'; }
  // Tailwind Play CDN sets this after processing
  if (document.readyState === 'complete') { setTimeout(reveal, 100); }
  else { window.addEventListener('load', function(){ setTimeout(reveal, 100); }); }
  // Fallback: force reveal after 1.5s no matter what
  setTimeout(reveal, 1500);
})();
</script>
