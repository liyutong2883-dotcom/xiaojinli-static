function render() {
  var dnaId = getAnimalFromStorage();
  if (!dnaId || !dnaData[dnaId]) {
    location.href = 'onboarding.html';
    return;
  }

  var dna = dnaData[dnaId];
  var container = document.getElementById('resultContent');

  var starRows = '';
  for (var key in starLabels) {
    starRows += '<div class="flex items-center justify-between py-2">' +
      '<span class="text-sm text-textSub w-12">' + starLabels[key] + '</span>' +
      '<div class="flex gap-0.5">' + renderStars(dna.stars[key]) + '</div>' +
      '</div>';
  }

  // Build keyword tags from growth category
  var growthCats = dnaTagSystem.dimensions.growth.categories;
  var keywordTags = '';
  if (growthCats[dnaId]) {
    growthCats[dnaId].tags.forEach(function(tag) {
      keywordTags += '<span class="inline-flex items-center gap-1 bg-primary/5 border border-primary/15 rounded-full px-3 py-1.5 text-xs text-textMain">' +
        '<span>' + tag.emoji + '</span> ' + tag.text +
        '</span>';
    });
  }

  // Build dimension bars for first 5 dimensions
  var dimPercentMap = {
    decision: { rational: 85, intuitive: 60, following: 40 },
    action:   { active: 90, cautious: 35, rhythmic: 65 },
    returns:  { longterm: 80, aggressive: 85, stable: 40 },
    risk:     { aggressive: 85, balanced: 60, conservative: 30 },
    emotion:  { stable: 90, normal: 55, volatile: 25 }
  };
  var dimLabelMap = {
    decision: { rational: '理性分析', intuitive: '经验直觉', following: '跟随决策' },
    action:   { active: '行动派', cautious: '谨慎派', rhythmic: '节奏型' },
    returns:  { longterm: '长期收益', aggressive: '收益优先', stable: '稳健收益' },
    risk:     { aggressive: '激进型', balanced: '平衡型', conservative: '保守型' },
    emotion:  { stable: '情绪稳定', normal: '情绪正常', volatile: '情绪波动' }
  };
  var dimKeys = ['decision', 'action', 'returns', 'risk', 'emotion'];
  var dimLabels = { decision: '决策', action: '行动', returns: '收益', risk: '风险', emotion: '情绪' };
  var dimBars = '';
  dimKeys.forEach(function(dk) {
    var cat = dna.dimensionMap[dk];
    var pct = dimPercentMap[dk][cat] || 50;
    var catLabel = dimLabelMap[dk][cat] || '';
    dimBars += '<div class="flex items-center gap-3">' +
      '<span class="text-xs text-textSub w-16">' + dimLabels[dk] + '</span>' +
      '<div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">' +
        '<div class="h-full bg-gradient-to-r from-primary to-secondary rounded-full" style="width: ' + pct + '%"></div>' +
      '</div>' +
      '<span class="text-[10px] text-primary font-medium w-14 text-right">' + catLabel + '</span>' +
      '</div>';
  });

  container.innerHTML =
    '<div class="result-card bg-white rounded-2xl shadow-md p-6 mt-4 text-center">' +
      '<div class="text-[80px] leading-none mb-3">' + dna.emoji + '</div>' +
